<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="./css/sign-up.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Jura:wght@700&family=Roboto&display=swap"
    />
  </head>
  <body>
    <main class="container">
      <header class="header">NSS SocialSync</header>
      <section class="signup-section">
        <h1 class="signup-title">SIGN UP</h1>
        <form class="signup-form">
          <div class="form-group">
            <label class="form-label" for="name">Name</label>
            <input type="text" class="form-input" id="name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="email-id">Email ID</label>
            <input type="email" class="form-input" id="email-id" />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-input" id="password" />
          </div>
          <button type="submit" class="signup-button">Sign Up</button>
          <p class="login-text">
            Existing User? <span class="login-link">Login here</span>
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
