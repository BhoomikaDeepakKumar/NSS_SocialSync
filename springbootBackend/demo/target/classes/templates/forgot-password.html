<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - NSS SocialSync</title>
  <link rel="stylesheet" href="../static/css/forgot-password.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Julius+Sans+One&family=Jura:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="forgot-password-page">
    <header class="header">
      <img src="../static/images/logo.jpeg" alt="NSS SocialSync Logo" class="logo" />
    </header> 
    <h2 class="page-title">Forgot password</h2>
    <section class="reset-container">
      <form class="password-form">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-input" required>
          <label for="new-password" class="form-label">New Password</label>
          <input type="password" id="new-password" class="form-input" required>
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-input" required>

        <button type="submit" class="submit-button">Submit</button>
      </form>
    </section>
    </main>
</body>
</html>
