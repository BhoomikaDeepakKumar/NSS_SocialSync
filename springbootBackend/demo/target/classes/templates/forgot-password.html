<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - NSS SocialSync</title>
  <link rel="stylesheet" href="/css/forgot-password.css">
   <link rel="stylesheet" href="/css/register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Julius+Sans+One&family=Jura:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="page">
    <header class="header">
      <img src="/images/logo.jpeg" alt="NSS SocialSync Logo" class="logo" />
    </header> 
    <h1 class="title">Forgot password</h1>
    <section class="container">
      <form class="form" method="POST" action="/reset-password">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="Enter email" required>
          <label for="new-password" class="form-label">New Password</label>
          <input type="password" id="new-password" name="newPassword" class="form-input" placeholder="Enter new password" required>
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirmPassword" class="form-input" placeholder="Enter confirm password"required>

        <button type="submit" class="button">Submit</button>
      </form>
    </section>
    </main>
      <script src="/js/main.js"></script>
</body>
</html>
