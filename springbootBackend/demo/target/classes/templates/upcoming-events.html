<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSS SocialSync - index</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/upcoming-events.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Gowun+Dodum:wght@400&family=Hannari:wght@400&family=Poppins:wght@400;500;700&family=Nunito:wght@400;700&family=Open+Sans:wght@400&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <main class="admin-panel-page">
        <div class="admin-panel">
            <div id="header-container"></div>
            <div class="main-container">
                <div id="sidebar-container"></div>
                <section class="content">
                    <div class="breadcrumb-section">
                        <h2 class="page-title">UPCOMING EVENTS</h2>
                        <div class="breadcrumb">
                            Home / <span class="current-page">Upcoming Events</span>
                        </div>
                    </div>


                          <div class="search-bar mb-4 d-flex flex-wrap gap-2 align-items-center">
  <input
    type="text"
    id="searchInput"
    class="form-control"
    placeholder="Search by event name or date (YYYY-MM-DD)"
    style="max-width: 300px;"
  />
  <button class="btn btn-primary" onclick="filterEvents()">Search</button>
  <button class="btn btn-outline-secondary" onclick="resetSearch()">Reset</button>
</div>
                    <div id="upcoming-events-list" class="row">
                        <!-- Events will be inserted here dynamically -->
                    </div>
                </section>
            </div>
        </div>
    </main>
    <script src="/js/upcoming-events.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
