<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSS SocialSync - index</title>
  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Gowun+Dodum&family=Hannari&family=Poppins:wght@400;500;700&family=Nunito:wght@400;700&family=Open+Sans&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/index.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

</head>

<body>
  <main class="admin-panel-page">
    <div class="admin-panel">
      <div id="header-container"></div>

      <div class="main-container">
        <div id="sidebar-container"></div> <!-- Sidebar will be loaded here -->

        <section class="content">
          <div class="breadcrumb-section">
            <h2 class="page-title">DASHBOARD</h2>
            <div class="breadcrumb">
              Home / <span class="current-page">Dashboard</span>
            </div>
          </div>
          <h3 class="section-title">EVENT CALENDER</h3>
          <div class="calendar-section" id="calendar-wrapper">
            <div id="eventCalendar"></div>
          </div>

          <div class="stats-section">
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-content">
                  <h4 class="stat-title">Last Event Attendance</h4>
                  <div class="stat-details">
                    <div class="stat-number" id="last-event-attendance">Loading...</div>
                  </div>
                </div>
              </div>

              <div class="stat-card">
                <div class="stat-content">
                  <h4 class="stat-title">Average Attendance</h4>
                  <div class="stat-details">
                    <div class="stat-number" id="average-attendance">Loading...</div>
                  </div>
                </div>
              </div>
               <div class="stat-card">
                <div class="stat-content">
                  <h4 class="stat-title">Consolidated Volunteer Count</h4>
                  <div class="stat-details">
                    <div class="stat-number" id="average-attendance">100</div>
                  </div>
                </div>
              </div>
        </section>
      </div>
    </div>
  </main>
  <div id="footer-container"></div>
  <script src="/js/index.js"></script>
  <script src="/js/main.js"></script>
</body>

</html>
