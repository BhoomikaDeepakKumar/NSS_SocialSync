<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSS SocialSync - index</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/reports.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Gowun+Dodum:wght@400&family=Hannari:wght@400&family=Poppins:wght@400;500;700&family=Nunito:wght@400;700&family=Open+Sans:wght@400&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <main class="admin-panel-page">
    <div class="admin-panel">
      <div id="header-container"></div>

      <div class="main-container">
        <div id="sidebar-container"></div>

        <section class="content">
          <div class="breadcrumb-section">
            <h2 class="page-title">REPORTS</h2>
            <div class="breadcrumb">
              Home / <span class="current-page">Records</span>
            </div>
          </div>



          <!-- Leaderboard -->
          <div class="mb-4">
            <h4 class="report-heading">Leaderboard: Top 10 Most Active Participants</h4>
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Rank</th>

                  <th>Student Name</th>
                  <th>Student ID</th>
                  <th>Events Attended</th>
                </tr>
              </thead>
              <tbody id="leaderboardTableBody"></tbody>
            </table>
          </div>



          <!-- Line Graph: Monthly Attendance Trends -->
          <div class="mb-4">
            <label for="lineChartMonth" class="report-heading">Select Month for Attendance Trends:</label>
            <input type="month" id="lineChartMonth" class="form-control mb-2" />
            <canvas id="monthlyAttendanceLineChart"></canvas>
            <div id="lineChartMessage" class="text-center fw-bold mt-2"></div>
          </div>

          <!-- Heatmap Section -->
          <div class="mb-4">
            <label for="heatmapMonth" class="report-heading">Select Month to View Attendance Heatmap:</label>
            <input type="month" id="heatmapMonth" class="form-control mb-2" />
            <div id="attendanceHeatmap" class="heatmap-container"></div>
          </div>

          <!-- Student Search for Pie Chart -->
          <div class="report-controls mb-4 position-relative">
            <label for="studentSearchInput" class="report-heading">Search Student for Attendance Summary:</label>
            <div class="d-flex gap-3 flex-wrap align-items-center">
              <input type="text" id="searchInput" placeholder="Enter Student ID" class="form-control w-auto">

              <select id="academicYearSelect" class="form-select w-auto">
                <!-- options will be populated dynamically -->
              </select>

              <button onclick="fetchStudentPieChart()" class="btn btn-primary" id="searchBtn">Search</button>
            </div>
             <p id="academicYearInfo" style="margin-top: 8px; color: #555;"></p>

            <canvas id="studentAttendancePieChart" width="400" height="400" style="display: none;"
              class="mt-4"></canvas>
            <p id="pieChartMessage" style="color: red; font-weight: bold;"></p>
          </div>

      </div>

      </section>
    </div>
    </div>
  </main>
  <script src="/js/reports.js"></script>
  <script src="/js/main.js"></script>
</body>

</html>
