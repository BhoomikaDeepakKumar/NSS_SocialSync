<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSS SocialSync - index</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/profile.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Gowun+Dodum:wght@400&family=Hannari:wght@400&family=Poppins:wght@400;500;700&family=Nunito:wght@400;700&family=Open+Sans:wght@400&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />
</head>

<body>
  <main class="admin-panel-page">
    <div class="admin-panel">
      <div id="header-container"></div>

      <div class="main-container">
        <div id="sidebar-container"></div>

        <section class="content">
          <div class="breadcrumb-section">
            <h2 class="page-title">PROFILE</h2>
            <div class="breadcrumb">
              Home / <span class="current-page">Profile</span>
            </div>
          </div>

          <div class="profile-card-wrapper">
            <div class="profile-card">
              <div class="profile-header">
                <div class="profile-initial" id="profileInitial">A</div>
                <h3 id="profileUsername">Username</h3>
                <p class="profile-email" id="profileEmail">
                  user@example.com
                </p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="/js/profile.js"></script>
  <script src="/js/main.js"></script>
</body>

</html>
